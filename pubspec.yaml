name: liquid_glass_bottom_navbar_plus
description: "A drop-in Flutter bottom bar with Apple iOS 26 Liquid Glass — refraction, specular highlights, fluid morph and scroll-minimize, with a frosted fallback."
version: 0.0.2
homepage: https://github.com/burakozyurt/liquid-glass-bottom-nav-bar
repository: https://github.com/burakozyurt/liquid-glass-bottom-nav-bar
issue_tracker: https://github.com/burakozyurt/liquid-glass-bottom-nav-bar/issues

# pub.dev topics — surfaced on the package page and in search.
topics:
  - liquid-glass
  - glassmorphism
  - navigation-bar
  - bottom-bar
  - shader

environment:
  sdk: ^3.10.7
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  # Utilities around ui.FragmentProgram (AnimatedSampler / ShaderBuilder) used
  # by the shader path. Wired in M2.
  flutter_shaders: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # GLSL fragment shaders for the Liquid Glass material (Impeller path).
  # Includes (shaders/include/*.glsl) are resolved by impellerc at build time.
  shaders:
    - shaders/liquid_glass.frag

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
